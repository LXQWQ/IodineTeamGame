                electrons.push({ x, y, spawnTime: now });
                if (electrons.length > 8) electrons.shift();
            }
        }

        function updateElectrons(now) {
            for (let i=0; i<electrons.length; i++) {
                const e = electrons[i];
                if (now - e.spawnTime >= ELECTRON_AUTO_COLLECT_TIME) {
                    startFlyAnimation(e.x, e.y);
                    electrons.splice(i,1);
                    i--;
                }
            }
        }

        function startFlyAnimation(fromX, fromY) {
            const targetRect = document.querySelector('.stats').getBoundingClientRect();
            const canvasRect = canvas.getBoundingClientRect();
            const targetX = targetRect.left + targetRect.width - 20;
            const targetY = targetRect.top + 20;
            const startX = fromX + canvasRect.left;
            const startY = fromY + canvasRect.top;
            flyAnimations.push({
                startX, startY, targetX, targetY, progress: 0, duration: 300, startTime: performance.now()
            });
        }

        function updateFlyAnimations(now) {
            for (let i=0; i<flyAnimations.length; i++) {
                const anim = flyAnimations[i];
                const elapsed = now - anim.startTime;
                if (elapsed >= anim.duration) {
                    essence += ELECTRON_VALUE;
                    updateUI();
                    flyAnimations.splice(i,1);
                    i--;
                } else {
                    anim.progress = elapsed / anim.duration;
                }
            }
        }

        function drawFlyAnimations() {
            const canvasRect = canvas.getBoundingClientRect();
            for (let anim of flyAnimations) {
                const t = anim.progress;
                const x = anim.startX + (anim.targetX - anim.startX) * t;
                const y = anim.startY + (anim.targetY - anim.startY) * t;
                const canvasX = x - canvasRect.left;
                const canvasY = y - canvasRect.top;
                ctx.save();
                ctx.beginPath();
                ctx.arc(canvasX, canvasY, 12, 0, 2*Math.PI);
                ctx.fillStyle = "#ffd966";
                ctx.shadowBlur = 8;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(canvasX, canvasY, 6, 0, 2*Math.PI);
                ctx.fillStyle = "#fff4b0";
                ctx.fill();
                ctx.restore();
            }
        }

        function tryCollectElectron(mouseX, mouseY) {
            for (let i=0; i<electrons.length; i++) {
                const e = electrons[i];
                const dx = mouseX - e.x, dy = mouseY - e.y;
                if (Math.hypot(dx, dy) < 20) {
                    startFlyAnimation(e.x, e.y);
                    electrons.splice(i,1);
                    return true;
                }
            }
            return false;
        }

        // 保存冷却数据到 localStorage
        function saveCooldownsToLocalStorage() {
            if (!currentUser) return;
            const key = `evz_cooldowns_${currentUser}`;
            const data = {
                cooldowns: elementCooldowns,
                timestamp: Date.now()
            };
            localStorage.setItem(key, JSON.stringify(data));
        }

        // 从 localStorage 加载冷却数据
        function loadCooldownsFromLocalStorage() {
            if (!currentUser) return false;
            const key = `evz_cooldowns_${currentUser}`;
            const raw = localStorage.getItem(key);
            if (!raw) return false;
            try {
                const data = JSON.parse(raw);
                const now = Date.now();
                const elapsed = (now - data.timestamp) / 1000;
                let changed = false;
                for (let type in data.cooldowns) {
                    let remaining = data.cooldowns[type] - elapsed;
                    if (remaining > 0) {
                        elementCooldowns[type] = remaining;
                        if (cooldownTimers[type]) clearTimeout(cooldownTimers[type]);
                        cooldownTimers[type] = setTimeout(() => {
                            delete elementCooldowns[type];
                            updateElementButtonsCooldown();
                            saveCooldownsToLocalStorage();
                        }, remaining * 1000);
                        changed = true;
                    }
                }
                if (changed) updateElementButtonsCooldown();
                return true;
            } catch(e) {
                console.warn("加载冷却数据失败", e);
                return false;
            }
        }

        function startElementCooldown(elementType, durationSeconds) {
            elementCooldowns[elementType] = durationSeconds;
            updateElementButtonsCooldown();
            if (cooldownTimers[elementType]) clearTimeout(cooldownTimers[elementType]);
            cooldownTimers[elementType] = setTimeout(() => {
                delete elementCooldowns[elementType];
                updateElementButtonsCooldown();
                saveCooldownsToLocalStorage();
            }, durationSeconds * 1000);
            saveCooldownsToLocalStorage();
        }

        function isElementOnCooldown(elementType) {
            return elementCooldowns[elementType] !== undefined && elementCooldowns[elementType] > 0;
        }

        function updateElementButtonsCooldown() {
            const btns = document.querySelectorAll('.element-btn');
            btns.forEach(btn => {
                const type = btn.dataset.type;
                if (!type) return;
                const remaining = elementCooldowns[type];
                if (remaining !== undefined && remaining > 0) {
                    btn.classList.add('disabled');
                    let mask = btn.querySelector('.cooldown-mask');
                    if (!mask) {
                        mask = document.createElement('div');
                        mask.className = 'cooldown-mask';
                        btn.appendChild(mask);
                    }
                    const totalCd = ELEMENTS[type].cd;
                    const percent = (remaining / totalCd) * 100;
                    mask.style.height = `${percent}%`;
                    let textSpan = btn.querySelector('.cooldown-text');
                    if (!textSpan) {
                        textSpan = document.createElement('div');
                        textSpan.className = 'cooldown-text';
                        btn.appendChild(textSpan);
                    }
                    textSpan.innerText = `${Math.ceil(remaining)}s`;
                } else {
                    btn.classList.remove('disabled');
                    const mask = btn.querySelector('.cooldown-mask');
                    if (mask) mask.remove();
                    const textSpan = btn.querySelector('.cooldown-text');
                    if (textSpan) textSpan.remove();
                }
            });
        }

        let lastCooldownUpdate = 0;
        function updateCooldowns(now) {
            if (!lastCooldownUpdate) lastCooldownUpdate = now;
            const deltaSec = Math.min(0.2, (now - lastCooldownUpdate) / 1000);
            if (deltaSec < 0.02) return;
            lastCooldownUpdate = now;
            let changed = false;
            for (let type in elementCooldowns) {
                elementCooldowns[type] -= deltaSec;
                if (elementCooldowns[type] <= 0) {
                    delete elementCooldowns[type];
                    changed = true;
                    if (cooldownTimers[type]) {
                        clearTimeout(cooldownTimers[type]);
                        delete cooldownTimers[type];
                    }
                }
            }
            if (changed) {
                updateElementButtonsCooldown();
                saveCooldownsToLocalStorage();
            } else {
                const btns = document.querySelectorAll('.element-btn');
                btns.forEach(btn => {
                    const type = btn.dataset.type;
                    if (!type) return;
                    const remaining = elementCooldowns[type];
                    if (remaining !== undefined && remaining > 0) {
                        const mask = btn.querySelector('.cooldown-mask');
                        if (mask) {
                            const totalCd = ELEMENTS[type].cd;
                            const percent = (remaining / totalCd) * 100;
                            mask.style.height = `${percent}%`;
                        }
                        const textSpan = btn.querySelector('.cooldown-text');
                        if (textSpan) textSpan.innerText = `${Math.ceil(remaining)}s`;
                    }
                });
            }
        }

        function spawnZombieByTime(now) {
            if (gameOver || !gameStartTime) return;
            const elapsed = (now - gameStartTime) / 1000;
            if (elapsed < 60) return;
            let baseInterval = Math.max(0.8, 2.5 - totalScore / 500);
            
            // Boss准备阶段大幅增加僵尸生成
            if (bossState === 'prep') {
                baseInterval = Math.max(0.1, baseInterval / 10); // 生成速度提高10倍
            }
            
            if (!lastZombieSpawnTime) lastZombieSpawnTime = now;
            if (now - lastZombieSpawnTime >= baseInterval * 1000) {
                lastZombieSpawnTime = now;
                let availableTypes = [];
                for (let [key, type] of Object.entries(ZOMBIE_TYPES)) {
                    if (elapsed >= type.unlockTime) {
                        availableTypes.push(key);
                    }
                }
                if (availableTypes.length === 0) return;
                const chosenType = availableTypes[Math.floor(Math.random() * availableTypes.length)];
                const typeData = ZOMBIE_TYPES[chosenType];
                let extraHp = Math.floor(totalScore / 20);
                let extraSpeed = totalScore / 200;
                const hp = typeData.hpBase + extraHp;
                const speed = Math.min(200, typeData.speedBase + extraSpeed);
                const rewardScore = typeData.rewardScore;
                const row = Math.floor(Math.random() * ROWS);
                let startX = canvas.width - EXTRA_RIGHT/2 - 20;
                if (bossState === 'prep' && bossArenaExpanded) {
                    const bossAreaLeft = COLS * CELL_W + EXTRA_RIGHT + 20;
                    const bossAreaRight = canvas.width - 40;
                    startX = bossAreaLeft + Math.random() * Math.max(0, bossAreaRight - bossAreaLeft);
                }
                const zombie = new Zombie(row, chosenType, hp, speed, rewardScore, startX);
                zombies.push(zombie);
            }
        }

        function handleExplosiveDeath(zombie, row, col) {
            const startRow = Math.max(0, row - 1);
            const endRow = Math.min(ROWS-1, row + 1);
            const startCol = Math.max(0, col - 1);
            const endCol = Math.min(COLS-1, col + 1);
            for (let r = startRow; r <= endRow; r++) {
                for (let c = startCol; c <= endCol; c++) {
                    const elem = gridElements[r][c];
                    if (elem && elem.health) {
                        elem.health -= 60;
                        if (elem.health <= 0) {
                            const idx = elements.findIndex(e => e === elem);
                            if (idx !== -1) elements.splice(idx,1);
                            gridElements[r][c] = null;
                            addParticles(elem.x, elem.y, elem.data.color, 15);
                        }
                    }
                }
            }
        }

        function placeElement(row, col) {
            if (gameOver) return false;
            if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return false;
            if (gridElements[row][col] !== null) return false;
            const elemData = ELEMENTS[selectedElement];
            if (elemData.isSkill) return false;
            const cost = elemData.cost;
            const canIgnoreEssence = adminDebug.enabled && adminDebug.freePlaceIgnoreEssence;
            const canIgnoreCooldown = adminDebug.enabled && adminDebug.ignoreElementCooldown;
            if (!canIgnoreEssence && essence < cost) { document.getElementById('gameMessage').innerHTML = `❌ 电子不足，需要 ${cost} 电子！`; return false; }
            if (!canIgnoreCooldown && isElementOnCooldown(selectedElement)) {
                document.getElementById('gameMessage').innerHTML = `⏳ 元素 ${elemData.name} 冷却中，请稍后再放。`;
                return false;
            }
            if (!canIgnoreEssence) essence -= cost;
            const newElem = new ElementObj(selectedElement, row, col);
            gridElements[row][col] = newElem;
            elements.push(newElem);
            updateUI();
            if (!canIgnoreCooldown) startElementCooldown(selectedElement, elemData.cd);
            addParticles(newElem.x, newElem.y, elemData.color, 12);
            return true;
        }

        function usePhosphorusSkill(row, col) {
            if (gameOver) return false;
            const cost = ELEMENTS.phosphorus.cost;
            if (essence < cost) { document.getElementById('gameMessage').innerHTML = `❌ 电子不足，需要 ${cost} 电子！`; return false; }
            if (isElementOnCooldown('phosphorus')) {
                document.getElementById('gameMessage').innerHTML = `⏳ 磷技能冷却中，请稍后再放。`;
                return false;
            }
            essence -= cost;
            updateUI();
            startElementCooldown('phosphorus', ELEMENTS.phosphorus.cd);
            let killedCount = 0;
            for (let i=zombies.length-1; i>=0; i--) {
                const z = zombies[i];
                const zRow = z.row;
                const zCol = Math.floor(z.x / CELL_W);
                if (Math.abs(zRow - row) <= 1 && Math.abs(zCol - col) <= 1) {
                    totalScore += z.rewardScore;
                    addParticles(z.x, z.y, "#ff6600", 25);
                    zombies.splice(i,1);
                    killedCount++;
                }
            }
            if (killedCount > 0) {
                updateUI();
                if (isLoggedIn && cloudAvailable) updateCloudScore(totalScore);
                document.getElementById('gameMessage').innerHTML = `🔥 磷爆！清除了 ${killedCount} 只僵尸。`;
            } else {
                document.getElementById('gameMessage').innerHTML = `🔥 磷爆，但没有僵尸在范围内。`;
            }
            return true;
        }

        function shovelPlant(row, col) {
            const elem = gridElements[row][col];
            if (!elem) return false;
            const cost = ELEMENTS[elem.type].cost;
            const refund = Math.floor(cost / 2);
            essence += refund;
            const idx = elements.findIndex(e => e === elem);
            if (idx !== -1) elements.splice(idx,1);
            gridElements[row][col] = null;
            updateUI();
            addParticles(elem.x, elem.y, elem.data.color, 20);
            document.getElementById('gameMessage').innerHTML = `🔧 铲除了 ${ELEMENTS[elem.type].name}，返还 ${refund} 电子。`;
            return true;
        }

        async function addScoreAndSync(amount) {
            totalScore += amount;
            updateUI();
            if (isLoggedIn && cloudAvailable) {
                await updateCloudScore(totalScore);
            }
        }

        function gameUpdate(now) {
            if (gameOver) { draw(); return; }
            let delta = Math.min(0.033, (now - lastFrame) / 1000);
            if (delta <= 0) { lastFrame = now; requestAnimationFrame(gameUpdate); return; }
            lastFrame = now;
            if (bossState === 'prep') {
                const prepElapsed = now - bossPrepStartTime;
                if (prepElapsed >= BOSS_PREP_DURATION) {
                    bossState = 'battle';
                    bossData.hp = bossData.maxHp;
                    document.getElementById('gameMessage').innerHTML = "☠️ Boss战正式开始！BOSS·元素之主-死灵法师 已进入满血状态。";
                }
            }
            
            if (bossState === 'victory_check') {
                const victoryElapsed = now - bossVictoryStartTime;
                if (victoryElapsed >= 30) { // 30秒胜利检查
                    // 检查场上是否还有僵尸
                    if (zombies.length === 0) {
                        // 胜利！
                        totalScore += 500000;
                        document.getElementById('gameMessage').innerHTML = "🎉 恭喜胜利！获得500000积分奖励！";
                        bossState = 'inactive';
                        bossArenaExpanded = false;
                        updateUI();
                        // 可以在这里添加胜利动画或效果
                    } else {
                        // 还有僵尸，延长检查时间
                        bossVictoryStartTime = now; // 重置计时器
                    }
                }
            }

            updateCooldowns(now);
            trySpawnElectron(now);
            updateElectrons(now);
            updateFlyAnimations(now);
            spawnZombieByTime(now);

            for (let elem of elements) elem.update(delta);
            for (let i=bullets.length-1; i>=0; i--) { bullets[i].update(delta); if (!bullets[i].active) bullets.splice(i,1); }
            for (let i=cannonBullets.length-1; i>=0; i--) { cannonBullets[i].update(delta); if (!cannonBullets[i].active) cannonBullets.splice(i,1); }
            bossTakeDamageFromBullets();
            bossBattleTick(now, delta);

            for (let i=zombies.length-1; i>=0; i--) {
                const z = zombies[i];
                if (bossState === 'prep') {
                    const absorbed = updateZombieTowardBoss(z, delta);
                    if (absorbed) {
                        zombies.splice(i,1);
                        continue;
                    }
                } else {
                    z.update(delta);
                }
                if (z.x + z.width/2 <= 0) {
                    gameOver = true;
                    document.getElementById('gameMessage').innerHTML = "💀 游戏结束！";
                    cancelAnimationFrame(frameRequest);
                    draw();
                    return;
                }
                if (z.hp <= 0) {
                    if (z.type === 'Explosive') {
                        const row = z.row;
                        const col = Math.floor(z.x / CELL_W);
                        handleExplosiveDeath(z, row, col);
                    }
                    addScoreAndSync(z.rewardScore);
                    addParticles(z.x, z.y, ZOMBIE_TYPES[z.type]?.color || "#ffffff", 20);
                    zombies.splice(i,1);
                }
            }

            for (let i=particles.length-1; i>=0; i--) {
                if (!particles[i].update(delta)) {
                    particles.splice(i,1);
                }
            }

            for (let elem of elements) {
                if (elem.attackTimer > 0) continue;
                if (elem.data.isSpikeweed) {
                    const col = elem.col;
                    for (let z of zombies) {
                        const zCol = Math.floor(z.x / CELL_W);
                        if (z.row === elem.row && zCol === col) {
                            z.hp -= elem.data.damage;
                            elem.attackTimer = elem.data.cooldown;
                            addParticles(z.x, z.y, elem.data.color, 5);
                            break;
                        }
                    }
                } else if (elem.data.isRanged === true && elem.data.damage > 0) {
                    let target = null;
                    let minX = Infinity;
                    for (let z of zombies) {
                        if (z.row === elem.row && z.x > elem.x && z.x < minX) {
                            minX = z.x;
                            target = z;
                        }
                    }
                    if (target) {
                        elem.attack(target);
                        elem.attackTimer = elem.data.cooldown;
                    } else if (elem.data.role === 'pierce') {
                        elem.attack(null);
                        elem.attackTimer = elem.data.cooldown;
                    }
                }
            }

            draw();
            frameRequest = requestAnimationFrame(gameUpdate);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#5a7a4a";
            ctx.lineWidth = 1;
            // 草地网格从大炮区域右侧开始
            const grassStartX = CANNON_ARENA_WIDTH;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(grassStartX + i*CELL_W, 0);
                ctx.lineTo(grassStartX + i*CELL_W, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(grassStartX, i*CELL_H);
                ctx.lineTo(grassStartX + COLS * CELL_W, i*CELL_H);
                ctx.stroke();
            }
            for (let j = 0; j <= COLS; j++) {
                ctx.beginPath();
                ctx.moveTo(grassStartX + j*CELL_W, 0);
                ctx.lineTo(grassStartX + j*CELL_W, ROWS*CELL_H);
                ctx.stroke();
            }
            ctx.fillStyle = "#1a3a2a";
            ctx.fillRect(grassStartX + COLS * CELL_W, 0, canvas.width - (grassStartX + COLS * CELL_W), canvas.height);
            ctx.strokeStyle = "#5a7a4a";
            ctx.strokeRect(grassStartX + COLS * CELL_W, 0, canvas.width - (grassStartX + COLS * CELL_W), canvas.height);
            
            // 大炮区域背景
            ctx.save();
            ctx.fillStyle = "rgba(45, 58, 20, 0.55)";
            ctx.fillRect(0, 0, CANNON_ARENA_WIDTH, canvas.height);
            ctx.strokeStyle = "#7a9a4a";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(CANNON_ARENA_WIDTH, 0);
            ctx.lineTo(CANNON_ARENA_WIDTH, canvas.height);
            ctx.stroke();
            ctx.font = "bold 20px sans-serif";
            ctx.fillStyle = "#c0d080";
            ctx.fillText("炮台 场地", 20, 30);
            ctx.restore();
            
            if (bossArenaExpanded) {
                ctx.save();
                ctx.fillStyle = "rgba(20, 8, 35, 0.55)";
                ctx.fillRect(canvas.width - BOSS_ARENA_WIDTH, 0, BOSS_ARENA_WIDTH, canvas.height);
                ctx.strokeStyle = "#a33dd9";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(canvas.width - BOSS_ARENA_WIDTH, 0);
                ctx.lineTo(canvas.width - BOSS_ARENA_WIDTH, canvas.height);
                ctx.stroke();
                ctx.font = "bold 20px sans-serif";
                ctx.fillStyle = "#d8b0ff";
                ctx.fillText("BOSS 场地", canvas.width - BOSS_ARENA_WIDTH + 20, 30);
                ctx.restore();
            }
            
            for (let elem of elements) elem.draw(ctx);
            for (let z of zombies) z.draw(ctx);
            for (let summon of bossData.summons) {
                const zombieData = ZOMBIE_TYPES[summon.type] || ZOMBIE_TYPES.Basic;
                ctx.fillStyle = zombieData.color || "#ffffff";
                ctx.fillRect(summon.x - 25, summon.y - 25, 50, 50);
                ctx.fillStyle = "#ffffff";
                ctx.font = "12px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(summon.type, summon.x, summon.y + 5);
            }
            if (bossState !== 'inactive') {
                ctx.save();
                ctx.beginPath();
                ctx.arc(bossData.x, bossData.y, 45, 0, Math.PI * 2);
                ctx.fillStyle = "#4b1f64";
                ctx.fill();
                ctx.lineWidth = 4;
                ctx.strokeStyle = "#d8b0ff";
                ctx.stroke();
                ctx.fillStyle = "#f5e6ff";
                ctx.font = "bold 14px sans-serif";
                ctx.fillText("死灵法师", bossData.x - 36, bossData.y + 5);
                ctx.restore();

                const percent = Math.max(0, Math.min(1, bossData.hp / bossData.maxHp));
                const barW = Math.min(500, canvas.width - 120);
                const barX = (canvas.width - barW) / 2;
                const barY = 12;
                ctx.fillStyle = "#2d163f";
                ctx.fillRect(barX, barY, barW, 22);
                ctx.fillStyle = "#b83bff";
                ctx.fillRect(barX, barY, barW * percent, 22);
                ctx.strokeStyle = "#f0c9ff";
                ctx.lineWidth = 2;
                ctx.strokeRect(barX, barY, barW, 22);
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 14px sans-serif";
                ctx.fillText(`BOSS·元素之主-死灵法师  HP ${Math.floor(bossData.hp)} / ${bossData.maxHp}`, barX + 8, barY + 16);
                ctx.fillStyle = "#f3d9ff";
                ctx.font = "bold 12px sans-serif";
                ctx.fillText(`尸值:${bossData.corpseValue}  氧化:${bossData.oxidation}  还原:${bossData.reduction}  铁甲:${bossData.ironArmor}  铁数:${bossData.ironCount}`, barX + 8, barY + 36);
                const absorbedTotal = Object.values(bossData.absorbList).reduce((a, b) => a + b, 0);
                ctx.fillText(`吸收僵尸:${absorbedTotal}  [B:${bossData.absorbList.Basic} A:${bossData.absorbList.Armored} F:${bossData.absorbList.Fast} E:${bossData.absorbList.Explosive} R:${bossData.absorbList.Runner} J:${bossData.absorbList.Jumper} G:${bossData.absorbList.Giant} H:${bossData.absorbList.Healer}]`, barX + 8, barY + 52);
                if (bossState === 'prep') {
                    const remainSec = Math.max(0, Math.ceil((BOSS_PREP_DURATION - (performance.now() - bossPrepStartTime)) / 1000));
                    ctx.fillStyle = "#ffd8ff";
                    ctx.font = "bold 13px sans-serif";
                    ctx.fillText(`准备时间剩余：${remainSec}s`, barX + barW - 140, barY + 68);
                }
                if (bossVortex) {
                    ctx.fillStyle = "#d6a6ff";
                    ctx.fillText(`漩涡剩余伤害: ${Math.max(0, Math.floor(bossVortex.remainingDamage))}`, barX + barW - 170, barY + 36);
                }
                if (bossCooldowns.domain > 0) {
                    ctx.fillStyle = "#d6a6ff";
                    ctx.fillText(`领域冷却: ${bossCooldowns.domain.toFixed(1)}s`, barX + barW - 150, barY + 52);
                }
                if (bossCooldowns.soulSwap > 0) {
                    ctx.fillStyle = "#ff6b6b";
                    ctx.fillText(`魂换冷却: ${bossCooldowns.soulSwap.toFixed(1)}s`, barX + barW - 150, barY + 68);
                }
                if (bossDomain) {
                    ctx.save();
                    ctx.strokeStyle = "rgba(200,120,255,0.55)";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(bossData.x, bossData.y, bossDomain.radiusPx, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }
                if (bossSoulSwap) {
                    // 渲染猩红色领域
                    ctx.save();
                    ctx.fillStyle = "rgba(220, 20, 60, 0.3)"; // 猩红色半透明
                    ctx.strokeStyle = "#DC143C"; // 猩红色边框
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(bossData.x, bossData.y, BOSS_PARAMS.soulSwap.radiusCells * CELL_W, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    ctx.restore();
                    
                    // 渲染链条
                    for (let chain of bossSoulSwap.chains) {
                        const target = chain.target;
                        if (target.health <= 0) continue;
                        
                        // 猩红色链条（偏向植物）
                        ctx.save();
                        ctx.strokeStyle = "#DC143C";
                        ctx.lineWidth = 3;
                        ctx.setLineDash([5, 5]);
                        ctx.beginPath();
                        const crimsonX = bossData.x + Math.sin(chain.crimsonOffset) * 20;
                        const crimsonY = bossData.y + Math.cos(chain.crimsonOffset) * 20;
                        ctx.moveTo(crimsonX, crimsonY);
                        ctx.lineTo(target.x + 18, target.y + 18);
                        ctx.stroke();
                        ctx.restore();
                        
                        // 灵魂蓝色链条（偏向Boss）
                        ctx.save();
                        ctx.strokeStyle = "#4169E1"; // 灵魂蓝色
                        ctx.lineWidth = 3;
                        ctx.setLineDash([8, 4]);
                        ctx.beginPath();
                        const soulX = target.x + 18 + Math.sin(chain.soulOffset) * 15;
                        const soulY = target.y + 18 + Math.cos(chain.soulOffset) * 15;
                        ctx.moveTo(bossData.x, bossData.y);
                        ctx.lineTo(soulX, soulY);
                        ctx.stroke();
                        ctx.restore();
                        
                        // 添加丰富的粒子效果
                        const progress = bossSoulSwap.elapsed / bossSoulSwap.duration;
                        
                        // 猩红色粒子：沿着链条流动
                        for (let i = 0; i < 3; i++) {
                            const particleProgress = (progress + i * 0.3) % 1;
                            const particleX = crimsonX + (target.x + 18 - crimsonX) * particleProgress;
                            const particleY = crimsonY + (target.y + 18 - crimsonY) * particleProgress;
                            
                            ctx.save();
                            ctx.beginPath();
                            ctx.arc(particleX, particleY, 4, 0, Math.PI * 2);
                            ctx.fillStyle = "#DC143C";
                            ctx.shadowBlur = 8;
                            ctx.shadowColor = "#DC143C";
                            ctx.fill();
                            ctx.restore();
                        }
                        
                        // 灵魂蓝色粒子：沿着链条流动
                        for (let i = 0; i < 2; i++) {
                            const particleProgress = (progress + i * 0.5 + 0.2) % 1;
                            const particleX = bossData.x + (soulX - bossData.x) * particleProgress;
                            const particleY = bossData.y + (soulY - bossData.y) * particleProgress;
                            
                            ctx.save();
                            ctx.beginPath();
                            ctx.arc(particleX, particleY, 3, 0, Math.PI * 2);
                            ctx.fillStyle = "#4169E1";
                            ctx.shadowBlur = 6;
                            ctx.shadowColor = "#4169E1";
                            ctx.fill();
                            ctx.restore();
                        }
                        
                        // 额外的能量粒子效果
                        if (Math.random() < 0.3) {
                            const angle = Math.random() * Math.PI * 2;
                            const distance = Math.random() * 30;
                            const energyX = (crimsonX + target.x + 18) / 2 + Math.cos(angle) * distance;
                            const energyY = (crimsonY + target.y + 18) / 2 + Math.sin(angle) * distance;
                            
                            ctx.save();
                            ctx.beginPath();
                            ctx.arc(energyX, energyY, 2, 0, Math.PI * 2);
                            ctx.fillStyle = Math.random() > 0.5 ? "#DC143C" : "#4169E1";
                            ctx.shadowBlur = 4;
                            ctx.shadowColor = ctx.fillStyle;
                            ctx.fill();
                            ctx.restore();
                        }
                    }
                    
                    // 显示剩余时间
                    const remainSec = Math.max(0, Math.ceil(bossSoulSwap.duration - bossSoulSwap.elapsed));
                    ctx.fillStyle = "#ff6b6b";
                    ctx.font = "bold 16px sans-serif";
                    ctx.fillText(`魂换剩余: ${remainSec}s`, barX + barW - 120, barY + 84);
                }
                for (let w of bossShockwaves) {
                    ctx.save();
                    ctx.globalAlpha = w.alpha;
                    ctx.strokeStyle = w.color;
                    ctx.lineWidth = w.lineWidth;
                    ctx.shadowBlur = 18;
                    ctx.shadowColor = "#d9b3ff";
                    ctx.beginPath();
                    ctx.arc(w.x, w.y, w.radius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }
            }
            if (bossSkillBanner.text && bossSkillBanner.startTime > 0) {
                const elapsed = performance.now() - bossSkillBanner.startTime;
                const fadeIn = 350;
                const hold = Math.max(0, bossSkillBanner.durationMs - 700);
                const fadeOut = 350;
                let alpha = 0;
                if (elapsed < fadeIn) alpha = elapsed / fadeIn;
                else if (elapsed < fadeIn + hold) alpha = 1;
                else if (elapsed < fadeIn + hold + fadeOut) alpha = 1 - (elapsed - fadeIn - hold) / fadeOut;
                else {
                    bossSkillBanner.text = "";
                    bossSkillBanner.startTime = 0;
                    alpha = 0;
                }
                if (alpha > 0) {
                    const style = BOSS_SKILL_BANNER_STYLES[bossSkillBanner.style] || BOSS_SKILL_BANNER_STYLES.default;
                    const titleY = 98;
                    const scale = 1 + style.scaleBoost * (1 - alpha);
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.translate(canvas.width / 2, titleY);
                    ctx.scale(scale, scale);
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.font = "bold 34px sans-serif";
                    ctx.lineWidth = 5;
                    ctx.strokeStyle = style.stroke;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = style.glow;
                    ctx.strokeText(bossSkillBanner.text, 0, 0);
                    ctx.fillStyle = style.fill;
                    ctx.fillText(bossSkillBanner.text, 0, 0);
                    ctx.restore();
                }
            }
            
            // 绘制炮台 (仅在Boss战期间)
            if (bossState === 'battle') {
                // 设置大炮位置在大炮区域中心
                cannonX = CANNON_ARENA_WIDTH / 2;
                
                ctx.save();
                // 炮台主体
                ctx.fillStyle = "#4a4a4a";
                ctx.fillRect(cannonX - cannonWidth/2, cannonY - cannonHeight/2, cannonWidth, cannonHeight);
                ctx.strokeStyle = "#666666";
                ctx.lineWidth = 2;
                ctx.strokeRect(cannonX - cannonWidth/2, cannonY - cannonHeight/2, cannonWidth, cannonHeight);
                
                // 炮管
                ctx.fillStyle = "#333333";
                ctx.fillRect(cannonX + cannonWidth/2, cannonY - 8, 40, 16);
                ctx.strokeStyle = "#666666";
                ctx.strokeRect(cannonX + cannonWidth/2, cannonY - 8, 40, 16);
                
                // 充能指示器
                for (let i = 0; i < 3; i++) {
                    const barX = cannonX - 20;
                    const barY = cannonY - cannonHeight/2 - 15 - i * 12;
                    const barWidth = 40;
                    const barHeight = 8;
                    
                    ctx.fillStyle = i < cannonCharge ? "#ff6b35" : "#333333";
                    ctx.fillRect(barX, barY, barWidth, barHeight);
                    ctx.strokeStyle = "#666666";
                    ctx.lineWidth = 1;
                    ctx.strokeRect(barX, barY, barWidth, barHeight);
                }
                
                // 充能按钮
                const chargeButtonX = cannonX - 80;
                const chargeButtonY = cannonY + cannonHeight/2 + 20;
                const buttonWidth = 60;
                const buttonHeight = 25;
                
                ctx.fillStyle = "#448844";
                ctx.fillRect(chargeButtonX - buttonWidth/2, chargeButtonY - buttonHeight/2, buttonWidth, buttonHeight);
                ctx.strokeStyle = "#66aa66";
                ctx.lineWidth = 2;
                ctx.strokeRect(chargeButtonX - buttonWidth/2, chargeButtonY - buttonHeight/2, buttonWidth, buttonHeight);
                
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 12px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("充能", chargeButtonX, chargeButtonY + 4);
                
                // 显示充能CD
                if (cannonChargeCooldown > 0) {
                    ctx.fillStyle = "#ff0000";
                    ctx.font = "bold 10px sans-serif";
                    ctx.fillText(Math.ceil(cannonChargeCooldown) + "s", chargeButtonX, chargeButtonY - buttonHeight/2 - 5);
                }
                
                // 激发按钮
                const fireButtonX = cannonX + 80;
                const fireButtonY = cannonY + cannonHeight/2 + 20;
                
                const canFire = cannonCharge >= 3 && !isElementOnCooldown('phosphorus');
                ctx.fillStyle = canFire ? "#ff4444" : "#666666";
                ctx.fillRect(fireButtonX - buttonWidth/2, fireButtonY - buttonHeight/2, buttonWidth, buttonHeight);
                ctx.strokeStyle = canFire ? "#ff6666" : "#999999";
                ctx.lineWidth = 2;
                ctx.strokeRect(fireButtonX - buttonWidth/2, fireButtonY - buttonHeight/2, buttonWidth, buttonHeight);
                
                ctx.fillStyle = "#ffffff";
                ctx.fillText("激发", fireButtonX, fireButtonY + 4);
                
                // 显示激发CD
                if (cannonFireCooldown > 0) {
                    ctx.fillStyle = "#ff0000";
                    ctx.font = "bold 10px sans-serif";
                    ctx.fillText(Math.ceil(cannonFireCooldown) + "s", fireButtonX, fireButtonY - buttonHeight/2 - 5);
                }
                
                ctx.textAlign = "left";
                
                // 炮台标签
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 14px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("元素炮台", cannonX, cannonY - cannonHeight/2 - 35);
                ctx.font = "12px sans-serif";
                ctx.fillText("植物+电子充能", cannonX, cannonY - cannonHeight/2 - 20);
                ctx.textAlign = "left";
                
                ctx.restore();
            }
            
            for (let e of electrons) {
                const elapsed = (performance.now() - e.spawnTime) / 1000;
                const alpha = elapsed < 1.8 ? 1 : (1 - (elapsed-1.8)/0.2);
                ctx.save();
                ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
                ctx.beginPath();
                ctx.arc(e.x, e.y, 14, 0, 2*Math.PI);
                ctx.fillStyle = "#ffd966";
                ctx.shadowBlur = 12;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(e.x, e.y, 7, 0, 2*Math.PI);
                ctx.fillStyle = "#fff4b0";
                ctx.fill();
                ctx.restore();
            }
            for (let b of bullets) b.draw(ctx);
            for (let cb of cannonBullets) cb.draw(ctx);
            for (let p of particles) p.draw(ctx);
            drawFlyAnimations();

            if (mouseGrid.row !== -1 && !gameOver && mouseGrid.col >=0 && mouseGrid.col < COLS) {
                ctx.save(); 
                ctx.globalAlpha = 0.4; 
                if (skillMode) ctx.fillStyle = "#e67e22";
                else if (shovelMode) ctx.fillStyle = "#e05a3a";
                else ctx.fillStyle = "#f0c040";
                const grassStartX = CANNON_ARENA_WIDTH;
                ctx.fillRect(grassStartX + mouseGrid.col*CELL_W, mouseGrid.row*CELL_H, CELL_W, CELL_H); 
                ctx.restore();
            }
            if (gameOver) {
                ctx.font = "bold 32px sans-serif";
                ctx.fillStyle = "#f0c040";
                ctx.fillText("GAME OVER", canvas.width/2-120, canvas.height/2);
            }
        }

        let mouseGrid = { row: -1, col: -1 };
        function handleCanvasClick(e) {
            if (gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX, mouseY = (e.clientY - rect.top) * scaleY;
            if (tryCollectElectron(mouseX, mouseY)) return;
            
            // 检查炮台交互 (仅在Boss战期间)
            if (bossState === 'battle') {
                const currentCannonX = CANNON_ARENA_WIDTH / 2;
                
                // 检查是否点击充能按钮
                const chargeButtonX = currentCannonX - 80;
                const chargeButtonY = cannonY + cannonHeight/2 + 20;
                const buttonWidth = 60;
                const buttonHeight = 25;
                if (mouseX >= chargeButtonX - buttonWidth/2 && mouseX <= chargeButtonX + buttonWidth/2 &&
                    mouseY >= chargeButtonY - buttonHeight/2 && mouseY <= chargeButtonY + buttonHeight/2 &&
                    cannonCharge < 3 && elements.length >= 5 && essence >= 300 && cannonChargeCooldown <= 0) {
                    // 随机移除5个植物，消耗300电子充能
                    for (let i = 0; i < 5; i++) {
                        const randomIndex = Math.floor(Math.random() * elements.length);
                        const removedElement = elements.splice(randomIndex, 1)[0];
                        if (gridElements[removedElement.row] && gridElements[removedElement.row][removedElement.col] === removedElement) {
                            gridElements[removedElement.row][removedElement.col] = null;
                        }
                        addParticles(removedElement.x, removedElement.y, "#ff6b35", 8);
                    }
                    essence -= 300;
                    cannonCharge++;
                    cannonChargeCooldown = 30; // 设置30秒CD
                    document.getElementById('gameMessage').innerHTML = `⚡ 炮台充能完成！消耗5个植物和300电子，当前充能等级：${cannonCharge}/3`;
                    return;
                }
                
                // 检查是否点击激发按钮
                const fireButtonX = currentCannonX + 80;
                const fireButtonY = cannonY + cannonHeight/2 + 20;
                if (mouseX >= fireButtonX - buttonWidth/2 && mouseX <= fireButtonX + buttonWidth/2 &&
                    mouseY >= fireButtonY - buttonHeight/2 && mouseY <= fireButtonY + buttonHeight/2 &&
                    cannonCharge >= 3 && !isElementOnCooldown('phosphorus') && cannonFireCooldown <= 0) {
                    // 发射元素大炮子弹
                    cannonCharge = 0;
                    const cannonBullet = new CannonBullet(currentCannonX, cannonY, bossData.x, bossData.y);
                    cannonBullets.push(cannonBullet);
                    cannonFireCooldown = 60; // 设置60秒CD
                    document.getElementById('gameMessage').innerHTML = "💥 元素大炮发射！子弹飞向Boss！";
                    return;
                }
            }
            
            const grassStartX = CANNON_ARENA_WIDTH;
            const grassEndX = grassStartX + COLS * CELL_W;
            const col = Math.floor((mouseX - grassStartX) / CELL_W);
            const row = Math.floor(mouseY / CELL_H);
            if (row >= 0 && row < ROWS && mouseX >= grassStartX && mouseX < grassEndX) {
                if (skillMode) {
                    usePhosphorusSkill(row, col);
                    setSkillMode(false);
                } else if (shovelMode) {
                    shovelPlant(row, col);
                    setShovelMode(false);
                } else {
                    placeElement(row, col);
                }
            }
        }

        function handleMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX, mouseY = (e.clientY - rect.top) * scaleY;
            const grassStartX = CANNON_ARENA_WIDTH;
            const grassEndX = grassStartX + COLS * CELL_W;
            if (mouseX >= grassStartX && mouseX < grassEndX) {
                const col = Math.floor((mouseX - grassStartX) / CELL_W);
                const row = Math.floor(mouseY / CELL_H);
                if (row >= 0 && row < ROWS && col >= 0 && col < COLS) mouseGrid = { row, col };
                else mouseGrid = { row: -1, col: -1 };
            } else {
                mouseGrid = { row: -1, col: -1 };
            }
        }

        function setShovelMode(active) {
            shovelMode = active;
            if (skillMode) setSkillMode(false);
            const btn = document.getElementById('shovelBigBtn');
            if (active) {
                btn.classList.add('active');
                document.getElementById('gameMessage').innerHTML = "🔧 铲子模式已开启，点击植物可铲除并返还一半电子。再次点击铲子按钮取消。";
            } else {
                btn.classList.remove('active');
                document.getElementById('gameMessage').innerHTML = "⚛️ 铲子模式已关闭。";
            }
        }

        function setSkillMode(active) {
            skillMode = active;
            if (shovelMode) setShovelMode(false);
            if (active) {
                document.getElementById('gameMessage').innerHTML = "🔥 磷爆模式已开启，点击草地格子引爆3x3范围僵尸。";
            } else {
                document.getElementById('gameMessage').innerHTML = "⚛️ 磷爆模式已关闭。";
            }
        }

        function toggleShovelMode() {
            setShovelMode(!shovelMode);
        }

        function renderElementButtons() {
            const container = document.getElementById('elementGrid');
            container.innerHTML = '';
            elementOrder.forEach(type => {
                const elem = ELEMENTS[type];
                const btn = document.createElement('div');
                btn.className = `element-btn ${selectedElement === type ? 'selected' : ''}`;
                btn.style.backgroundColor = elem.color;
                btn.dataset.type = type;
                btn.innerHTML = `<div class="element-symbol">${elem.symbol}</div><div class="element-cost">${elem.cost}⚡</div>`;
                btn.addEventListener('click', () => {
                    if (shovelMode) setShovelMode(false);
                    if (skillMode) setSkillMode(false);
                    if (elem.isSkill) {
                        if (isElementOnCooldown(type)) {
                            document.getElementById('gameMessage').innerHTML = `⏳ 技能 ${elem.name} 冷却中，请稍后再放。`;
                            return;
                        }
                        setSkillMode(true);
                        selectedElement = type;
                        renderElementButtons();
                        document.getElementById('gameMessage').innerHTML = `🔥 已选中 ${elem.name} 技能，点击草地格子引爆。`;
                        return;
                    }
                    if (isElementOnCooldown(type)) {
                        document.getElementById('gameMessage').innerHTML = `⏳ 元素 ${elem.name} 冷却中，请稍后再放。`;
                        return;
                    }
                    selectedElement = type;
                    renderElementButtons();
                    document.getElementById('gameMessage').innerHTML = `已选中 ${elem.name} (${elem.symbol})，点击草地放置。`;
                });
                container.appendChild(btn);
            });
            updateElementButtonsCooldown();
        }

        function renderGuide() {
            const container = document.getElementById('guideContent');
            container.innerHTML = '';
            elementOrder.forEach(type => {
                const elem = ELEMENTS[type];
                const div = document.createElement('div');
                div.className = 'elem-desc';
                let skillDesc = '';
                if (elem.isSkill) skillDesc = '<br>🔥 技能：清除3x3范围僵尸';
                div.innerHTML = `<div class="symbol" style="background:${elem.color}">${elem.symbol}</div><div><strong>${elem.name}</strong><br>${elem.desc}${skillDesc}<br>💰 成本: ${elem.cost} 电子<br>❤️ 生命: ${elem.health || '—'}</div>`;
                container.appendChild(div);
            });
        }

        function restartGame() {
            gameOver = false;
            essence = 200;
            totalScore = 0;
            bossState = 'inactive';
            bossArenaExpanded = false;
            bossPrepStartTime = 0;
            bossButtonUnlocked = false;
            lastBossTickTime = 0;
            bossSkillTimer = 0;
            bossVortex = null;
            bossDomain = null;
            bossShockwaves = [];
            bossCooldowns.domain = 0;
            bossSkillBanner.text = "";
            bossSkillBanner.startTime = 0;
            // 重置炮台
            cannonCharge = 0;
            bossData.hp = 1;
            bossData.corpseValue = 0;
            bossData.oxidation = 0;
            bossData.reduction = 0;
            bossData.ironArmor = 0;
            bossData.ironCount = 0;
            for (let key in bossData.absorbList) bossData.absorbList[key] = 0;
            updateCanvasForBossArena();
            zombies = [];
            bullets = [];
            cannonBullets = [];
            electrons = [];
            flyAnimations = [];
            particles = [];
            initGrid();
            gameStartTime = performance.now();
            lastZombieSpawnTime = 0;
            lastElectronSpawn = 0;
            for (let t in cooldownTimers) clearTimeout(cooldownTimers[t]);
            elementCooldowns = {};
            cooldownTimers = {};
            for (let type of elementOrder) {
                const cd = ELEMENTS[type].cd;
                if (cd) {
                    startElementCooldown(type, cd);
                }
            }
            setShovelMode(false);
            setSkillMode(false);
            const bossBtn = document.getElementById('challengeBossBtn');
            if (bossBtn) {
                bossBtn.disabled = false;
                bossBtn.innerText = "👑 挑战Boss";
                bossBtn.classList.remove('show');
            }
            // ===== ADMIN DEBUG RESET START (可整段删除) =====
            const debugEnabledEl = document.getElementById('adminDebugEnabled');
            const debugFreePlaceEl = document.getElementById('adminFreePlace');
            const debugIgnoreCooldownEl = document.getElementById('adminIgnoreCooldown');
            adminDebug.enabled = !!debugEnabledEl?.checked;
            adminDebug.freePlaceIgnoreEssence = adminDebug.enabled && !!debugFreePlaceEl?.checked;
            adminDebug.ignoreElementCooldown = adminDebug.enabled && !!debugIgnoreCooldownEl?.checked;
            // ===== ADMIN DEBUG RESET END =====
            updateUI();
            document.getElementById('gameMessage').innerHTML = "✨ 游戏已重置！前60秒为发育期，不刷怪。";
            if (frameRequest) cancelAnimationFrame(frameRequest);
            frameRequest = requestAnimationFrame(gameUpdate);
            if (isLoggedIn) updateCloudScore(totalScore);
        }

        function bindEvents() {
            canvas.addEventListener('click', handleCanvasClick);
            canvas.addEventListener('mousemove', handleMouseMove);
            document.getElementById('restartBtn').addEventListener('click', restartGame);
            document.getElementById('openGuideBtn').addEventListener('click', () => { renderGuide(); document.getElementById('guideModal').classList.add('active'); });
            document.getElementById('closeGuideBtn').addEventListener('click', () => { document.getElementById('guideModal').classList.remove('active'); });
            document.getElementById('rankBtn').addEventListener('click', showRankModal);
            document.getElementById('closeRankBtn').addEventListener('click', () => {
                document.getElementById('rankModal').classList.remove('active');
            });
            document.getElementById('rankModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('rankModal')) {
                    document.getElementById('rankModal').classList.remove('active');
                }
            });
            document.getElementById('shovelBigBtn').addEventListener('click', toggleShovelMode);
            document.getElementById('challengeBossBtn').addEventListener('click', startBossChallenge);
            // ===== ADMIN DEBUG EVENTS START (可整段删除) =====
            const adminDebugEnabledEl = document.getElementById('adminDebugEnabled');
            const adminFreePlaceEl = document.getElementById('adminFreePlace');
            const adminIgnoreCooldownEl = document.getElementById('adminIgnoreCooldown');
            const adminScoreInputEl = document.getElementById('adminScoreInput');
            const adminSetScoreBtnEl = document.getElementById('adminSetScoreBtn');
            const adminTimeInputEl = document.getElementById('adminTimeInput');
            const adminSetTimeBtnEl = document.getElementById('adminSetTimeBtn');
            const adminBossPrepInputEl = document.getElementById('adminBossPrepInput');
            const adminSetBossPrepBtnEl = document.getElementById('adminSetBossPrepBtn');
            const adminBossCorpseInputEl = document.getElementById('adminBossCorpseInput');
            const adminSetBossCorpseBtnEl = document.getElementById('adminSetBossCorpseBtn');
            const adminBossHpInputEl = document.getElementById('adminBossHpInput');
            const adminSetBossHpBtnEl = document.getElementById('adminSetBossHpBtn');
            const adminBossSkillSelectEl = document.getElementById('adminBossSkillSelect');
            const adminCastBossSkillBtnEl = document.getElementById('adminCastBossSkillBtn');
            
            if (adminDebugEnabledEl && adminFreePlaceEl && adminIgnoreCooldownEl && 
                adminScoreInputEl && adminSetScoreBtnEl && adminTimeInputEl && adminSetTimeBtnEl &&
                adminBossPrepInputEl && adminSetBossPrepBtnEl && adminBossCorpseInputEl && adminSetBossCorpseBtnEl &&
                adminBossHpInputEl && adminSetBossHpBtnEl && adminBossSkillSelectEl && adminCastBossSkillBtnEl) {
                
                adminDebugEnabledEl.addEventListener('change', () => {
                    adminDebug.enabled = adminDebugEnabledEl.checked;
                    if (!adminDebug.enabled) {
                        adminDebug.freePlaceIgnoreEssence = false;
                        adminDebug.ignoreElementCooldown = false;
                        adminFreePlaceEl.checked = false;
                        adminIgnoreCooldownEl.checked = false;
                        adminScoreInputEl.disabled = true;
                        adminSetScoreBtnEl.disabled = true;
                        adminTimeInputEl.disabled = true;
                        adminSetTimeBtnEl.disabled = true;
                        adminBossPrepInputEl.disabled = true;
                        adminSetBossPrepBtnEl.disabled = true;
                        adminBossCorpseInputEl.disabled = true;
                        adminSetBossCorpseBtnEl.disabled = true;
                        adminBossHpInputEl.disabled = true;
                        adminSetBossHpBtnEl.disabled = true;
                        adminBossSkillSelectEl.disabled = true;
                        adminCastBossSkillBtnEl.disabled = true;
                        adminFreePlaceEl.disabled = true;
                        adminIgnoreCooldownEl.disabled = true;
                    } else {
                        adminFreePlaceEl.disabled = false;
                        adminIgnoreCooldownEl.disabled = false;
                        adminScoreInputEl.disabled = false;
                        adminSetScoreBtnEl.disabled = false;
                        adminTimeInputEl.disabled = false;
                        adminSetTimeBtnEl.disabled = false;
                        adminBossPrepInputEl.disabled = false;
                        adminSetBossPrepBtnEl.disabled = false;
                        adminBossCorpseInputEl.disabled = false;
                        adminSetBossCorpseBtnEl.disabled = false;
                        adminBossHpInputEl.disabled = false;
                        adminSetBossHpBtnEl.disabled = false;
                        adminBossSkillSelectEl.disabled = false;
                        adminCastBossSkillBtnEl.disabled = false;
                    }
                    document.getElementById('gameMessage').innerHTML = adminDebug.enabled
                        ? "🛠️ 管理员调试已开启。"
                        : "🛠️ 管理员调试已关闭。";
                });
                
                adminFreePlaceEl.addEventListener('change', () => {
                    adminDebug.freePlaceIgnoreEssence = adminDebug.enabled && adminFreePlaceEl.checked;
                    document.getElementById('gameMessage').innerHTML = adminDebug.freePlaceIgnoreEssence
                        ? "🛠️ 调试：植物可无视电子数放置。"
                        : "🛠️ 调试：植物无视电子数放置已关闭。";
                });
                
                adminIgnoreCooldownEl.addEventListener('change', () => {
                    adminDebug.ignoreElementCooldown = adminDebug.enabled && adminIgnoreCooldownEl.checked;
                    document.getElementById('gameMessage').innerHTML = adminDebug.ignoreElementCooldown
                        ? "🛠️ 调试：元素可无视冷却放置。"
                        : "🛠️ 调试：元素无视冷却放置已关闭。";
                });
                
                adminSetScoreBtnEl.addEventListener('click', () => {
                    if (!adminDebug.enabled) return;
                    const newScore = parseInt(adminScoreInputEl.value) || 0;
                    totalScore = Math.max(0, newScore);
                    updateUI();
                    document.getElementById('gameMessage').innerHTML = `🛠️ 调试：分数已设置为 ${totalScore}。`;
                });
                
                adminSetTimeBtnEl.addEventListener('click', () => {
                    if (!adminDebug.enabled) return;
                    const newTimeSeconds = parseFloat(adminTimeInputEl.value) || 0;
                    if (gameStartTime) {
                        gameStartTime = performance.now() - (newTimeSeconds * 1000);
                        updateUI();
                        document.getElementById('gameMessage').innerHTML = `🛠️ 调试：游戏时间已设置为 ${newTimeSeconds.toFixed(1)} 秒。`;
                    } else {
                        document.getElementById('gameMessage').innerHTML = "🛠️ 调试：游戏尚未开始，无法设置时间。";
                    }
                });

                adminSetBossPrepBtnEl.addEventListener('click', () => {
                    if (!adminDebug.enabled) return;
                    const newPrepSeconds = parseFloat(adminBossPrepInputEl.value) || 0;
                    if (bossState !== 'prep') {
                        document.getElementById('gameMessage').innerHTML = "🛠️ 调试：Boss当前不在准备阶段，无法调整准备时间。";
                        return;
                    }
                    bossPrepStartTime = performance.now() - newPrepSeconds * 1000;
                    updateUI();
                    document.getElementById('gameMessage').innerHTML = `🛠️ 调试：Boss准备时间已设置为 ${newPrepSeconds.toFixed(1)} 秒。`;
                });

                adminSetBossCorpseBtnEl.addEventListener('click', () => {
                    if (!adminDebug.enabled) return;
                    const newCorpse = Math.max(0, parseInt(adminBossCorpseInputEl.value) || 0);
                    bossData.corpseValue = newCorpse;
                    updateUI();
                    document.getElementById('gameMessage').innerHTML = `🛠️ 调试：Boss尸值已设置为 ${newCorpse}。`;
                });

                adminSetBossHpBtnEl.addEventListener('click', () => {
                    if (!adminDebug.enabled) return;
                    const newHp = Math.max(0, Math.min(bossData.maxHp, parseInt(adminBossHpInputEl.value) || 0));
                    bossData.hp = newHp;
                    updateUI();
                    document.getElementById('gameMessage').innerHTML = `🛠️ 调试：Boss血量已设置为 ${newHp}。`;
                });

                adminCastBossSkillBtnEl.addEventListener('click', () => {
                    if (!adminDebug.enabled) return;
                    const skillKey = adminBossSkillSelectEl.value;
                    const skillMap = {
                        vortex: castVortexSkill,
                        domain: castDomainSkill,
                        transformation: castTransformationSkill,
                        oxidation: castOxidationSkill,
                        reduction: castReductionSkill,
                        ironQuake: castIronQuakeSkill,
                        soulSwap: castSoulSwapSkill,
                        ironCannon: castIronCannonSkill
                    };
                    const skillFn = skillMap[skillKey];
                    if (!skillFn) {
                        document.getElementById('gameMessage').innerHTML = "🛠️ 调试：未找到该技能。";
                        return;
                    }
                    const executed = skillFn();
                    document.getElementById('gameMessage').innerHTML = executed
                        ? `🛠️ 调试：Boss已尝试使用技能 ${adminBossSkillSelectEl.options[adminBossSkillSelectEl.selectedIndex].text}。`
                        : `🛠️ 调试：Boss当前无法使用技能 ${adminBossSkillSelectEl.options[adminBossSkillSelectEl.selectedIndex].text}。`;
                });
            }
            // ===== ADMIN DEBUG EVENTS END =====
            window.addEventListener('beforeunload', () => {
                saveCooldownsToLocalStorage();
            });
        }

        function initCooldowns() {
            const loaded = loadCooldownsFromLocalStorage();
            if (!loaded) {
                for (let type of elementOrder) {
                    const cd = ELEMENTS[type].cd;
                    if (cd && !elementCooldowns[type]) {
                        startElementCooldown(type, cd);
                    }
                }
            }
        }

        async function init() {
            await initSupabaseAndUser();
            renderElementButtons();
            initCooldowns();
            bindEvents();
            updateUI();
            initGrid();
            gameStartTime = performance.now();
            lastFrame = performance.now();
            frameRequest = requestAnimationFrame(gameUpdate);
        }
        init();
    })();
</script>
</body>
</html>
