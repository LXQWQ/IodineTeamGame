<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>相转移大作战 · 多相宇宙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --border: #334155;
            --accent: #f59e0b;
            --text-light: #f1f5f9;
            --text-dim: #94a3b8;
        }
        body {
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
            color: var(--text-light);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .game-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 3rem;
            padding: 1.5rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f0f9ff, #bae6fd);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .arena {
            display: flex;
            align-items: stretch;
            gap: 1.5rem;
            margin: 1rem 0;
            min-height: 420px;
        }
        .player {
            flex: 1;
            background: var(--card-bg);
            border-radius: 2rem;
            padding: 1.2rem;
            text-align: center;
            transition: all 0.2s;
            border: 2px solid transparent;
            box-shadow: 0 8px 16px -6px rgba(0,0,0,0.3);
        }
        .player.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent), 0 10px 20px -5px rgba(0,0,0,0.5);
            background: #2d3a4e;
        }
        .player-name {
            font-size: 1.6rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }
        .phase-icon {
            font-size: 2rem;
        }
        .phase-text {
            font-size: 0.9rem;
            background: #0f172a;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            margin-top: 0.5rem;
            color: var(--text-dim);
        }
        .boundary-line {
            width: 90%;
            height: 4px;
            background: var(--border);
            margin: 1rem auto;
            border-radius: 4px;
            position: relative;
        }
        .reaction-zone {
            width: 320px;
            background: #0f172a;
            border-radius: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 1rem 0;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            border: 1px solid var(--accent);
        }
        .reactant-card {
            background: #1e293b;
            border-radius: 1.5rem;
            padding: 0.8rem;
            margin: 10px;
            width: 90%;
            text-align: center;
            border: 1px solid var(--accent);
        }
        .reactant-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent);
        }
        .reactant-state {
            font-size: 0.8rem;
            background: #0f172a;
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            margin-top: 0.3rem;
        }
        .reactant-icon {
            font-size: 3rem;
            margin: 5px 0;
        }
        .progress-track {
            width: 180px;
            height: 18px;
            background: #334155;
            border-radius: 40px;
            margin: 15px auto;
            position: relative;
            overflow: hidden;
        }
        .progress-fill {
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, #ef4444, #3b82f6);
            border-radius: 40px;
            transition: width 0.3s ease-out;
        }
        .position-value {
            font-size: 0.8rem;
            font-family: monospace;
            background: #00000066;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .current-turn {
            background: var(--accent);
            color: #0f172a;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 10px;
        }
        .hand-area {
            background: var(--card-bg);
            border-radius: 2rem;
            padding: 1rem;
            margin-top: 1rem;
            border: 1px solid var(--border);
        }
        .hand-title {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .cards {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            background: linear-gradient(145deg, #2d3a4e, #1e2a3a);
            border-radius: 1.5rem;
            width: 150px;
            padding: 0.8rem 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s ease;
            border: 1px solid #475569;
            box-shadow: 0 6px 0 #0f172a;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 0 #0f172a;
            background: #3b4a62;
        }
        .card:active {
            transform: translateY(2px);
            box-shadow: 0 4px 0 #0f172a;
        }
        .card.disabled {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(0.3);
        }
        .card-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 0.2rem;
        }
        .card-desc {
            font-size: 0.7rem;
            color: var(--text-dim);
        }
        .card-power {
            font-size: 1rem;
            font-weight: bold;
            color: var(--accent);
            margin-top: 0.3rem;
        }
        button {
            background: var(--accent);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            color: #0f172a;
            transition: 0.1s;
        }
        button:hover {
            transform: scale(0.97);
            filter: brightness(1.1);
        }
        .reset-btn {
            background: #475569;
            color: white;
        }
        .game-message {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-dim);
            min-height: 2.5rem;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1rem;
            color: var(--text-dim);
        }
        @media (max-width: 850px) {
            .arena { flex-direction: column; align-items: center; }
            .reaction-zone { width: 100%; order: -1; margin-bottom: 1rem; }
            .player { width: 100%; }
            .card { width: 120px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>⚛️ 相转移大作战 · 多相宇宙 ⚛️</h1>
    <div class="arena">
        <div class="player" id="playerLeft">
            <div class="player-name"><span id="leftName">🔴 左道修士</span></div>
            <div class="phase-text" id="leftPhase">固相</div>
            <div class="boundary-line"></div>
            <div class="phase-icon" id="leftIcon">❄️</div>
        </div>
        <div class="reaction-zone">
            <div class="reactant-card" id="reactantCard">
                <div class="reactant-icon" id="reactantIcon">🧪</div>
                <div class="reactant-name" id="reactantName">未知物质</div>
                <div class="reactant-state" id="reactantState">状态未知</div>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="position-value" id="positionLabel">50.0</div>
            <div class="current-turn" id="turnIndicator">左道回合</div>
        </div>
        <div class="player" id="playerRight">
            <div class="player-name"><span id="rightName">🔵 右道修士</span></div>
            <div class="phase-text" id="rightPhase">液相</div>
            <div class="boundary-line"></div>
            <div class="phase-icon" id="rightIcon">💧</div>
        </div>
    </div>
    <div class="hand-area">
        <div class="hand-title">
            <span>🎴 反应条件卡牌 (点击使用)</span>
            <button id="resetGameBtn" class="reset-btn">🔄 新物质·新对局</button>
        </div>
        <div class="cards" id="cardsContainer"></div>
        <div class="game-message" id="gameMessage"></div>
    </div>
    <footer>🧪 科学规则：使用卡牌后，若新相更接近你的相，则物质向你移动；反之远离。相不变时按自然方向（加热向右，冷却向左，电离向右，加压向左，减压向右，催化向玩家）。</footer>
</div>

<script>
    // ======================= 相定义 =======================
    const PHASES = {
        solid: { name: "固相", icon: "❄️", order: 0 },
        liquid: { name: "液相", icon: "💧", order: 1 },
        gas: { name: "气相", icon: "💨", order: 2 },
        organic: { name: "有机相", icon: "🌿", order: 3 },
        plasma: { name: "等离子相", icon: "⚡", order: 4 }
    };
    const PHASE_KEYS = ["solid", "liquid", "gas", "organic", "plasma"];

    // ======================= 物质库 =======================
    const SUBSTANCES = [
        { name: "氢氧化钠", icon: "🧪", phases: ["solid", "liquid", "plasma"] },
        { name: "水", icon: "💧", phases: ["solid", "liquid", "gas"] },
        { name: "乙醇", icon: "🍷", phases: ["liquid", "gas", "organic"] },
        { name: "甲烷", icon: "🔥", phases: ["gas", "organic"] },
        { name: "二氧化碳", icon: "🌫️", phases: ["solid", "gas"] },
        { name: "铁", icon: "⚙️", phases: ["solid", "liquid", "plasma"] },
        { name: "汞", icon: "🌡️", phases: ["liquid", "gas"] },
        { name: "葡萄糖", icon: "🍬", phases: ["solid", "liquid", "organic"] },
        { name: "氯化钠", icon: "🧂", phases: ["solid", "liquid", "plasma"] },
        { name: "氢气", icon: "💨", phases: ["gas", "plasma"] }
    ];

    // ======================= 卡牌定义 =======================
    // 每张卡牌包含：
    // - name, desc
    // - naturalDirection: 相不变时的自然偏移方向 (+1向右, -1向左)
    // - getNewPhase: 函数，返回新相或 null
    const CARD_TEMPLATES = [
        {
            name: "🔥 加热",
            desc: "升高相序（固→液→气→有机→等离子）",
            naturalDirection: +1,
            getNewPhase: (currentPhase) => {
                let order = PHASES[currentPhase].order;
                if (order < 4) return PHASE_KEYS[order + 1];
                return null;
            }
        },
        {
            name: "❄️ 冷却",
            desc: "降低相序（等离子→有机→气→液→固）",
            naturalDirection: -1,
            getNewPhase: (currentPhase) => {
                let order = PHASES[currentPhase].order;
                if (order > 0) return PHASE_KEYS[order - 1];
                return null;
            }
        },
        {
            name: "⚡ 电离",
            desc: "升高相序，直接向等离子相转变",
            naturalDirection: +1,
            getNewPhase: (currentPhase) => {
                if (currentPhase !== "plasma") return "plasma";
                return null;
            }
        },
        {
            name: "🌊 加压",
            desc: "降低相序（促进凝聚）",
            naturalDirection: -1,
            getNewPhase: (currentPhase) => {
                let order = PHASES[currentPhase].order;
                if (order > 0) return PHASE_KEYS[order - 1];
                return null;
            }
        },
        {
            name: "🌀 减压",
            desc: "升高相序（促进气化/等离子化）",
            naturalDirection: +1,
            getNewPhase: (currentPhase) => {
                let order = PHASES[currentPhase].order;
                if (order < 4) return PHASE_KEYS[order + 1];
                return null;
            }
        },
        {
            name: "🧪 催化",
            desc: "不改变相，直接向玩家方向偏移",
            naturalDirection: 0, // 特殊，将由函数决定
            getNewPhase: () => null
        }
    ];

    // ======================= 游戏状态 =======================
    let currentSubstance = null;
    let currentPhase = "";
    let leftPhase = "";
    let rightPhase = "";
    let position = 50;
    let currentTurn = "left";
    let gameActive = true;
    let currentCards = [];

    // DOM 元素
    const leftDiv = document.getElementById('playerLeft');
    const rightDiv = document.getElementById('playerRight');
    const leftNameSpan = document.getElementById('leftName');
    const rightNameSpan = document.getElementById('rightName');
    const leftPhaseSpan = document.getElementById('leftPhase');
    const rightPhaseSpan = document.getElementById('rightPhase');
    const leftIconSpan = document.getElementById('leftIcon');
    const rightIconSpan = document.getElementById('rightIcon');
    const turnIndicator = document.getElementById('turnIndicator');
    const progressFill = document.getElementById('progressFill');
    const positionLabel = document.getElementById('positionLabel');
    const cardsContainer = document.getElementById('cardsContainer');
    const gameMessageDiv = document.getElementById('gameMessage');
    const resetBtn = document.getElementById('resetGameBtn');
    const reactantNameSpan = document.getElementById('reactantName');
    const reactantStateSpan = document.getElementById('reactantState');
    const reactantIconSpan = document.getElementById('reactantIcon');

    // ======================= 辅助函数 =======================
    function assignPlayerPhases() {
        let phases = [...PHASE_KEYS];
        for (let i = phases.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [phases[i], phases[j]] = [phases[j], phases[i]];
        }
        leftPhase = phases[0];
        rightPhase = phases[1];
        leftNameSpan.innerText = `🔴 ${PHASES[leftPhase].name}修士`;
        rightNameSpan.innerText = `🔵 ${PHASES[rightPhase].name}修士`;
        leftPhaseSpan.innerText = PHASES[leftPhase].name;
        rightPhaseSpan.innerText = PHASES[rightPhase].name;
        leftIconSpan.innerText = PHASES[leftPhase].icon;
        rightIconSpan.innerText = PHASES[rightPhase].icon;
    }

    function selectRandomSubstance() {
        const idx = Math.floor(Math.random() * SUBSTANCES.length);
        const sub = { ...SUBSTANCES[idx] };
        currentSubstance = sub;
        const allowedPhases = sub.phases;
        const initPhase = allowedPhases[Math.floor(Math.random() * allowedPhases.length)];
        currentPhase = initPhase;
        reactantNameSpan.innerText = sub.name;
        reactantStateSpan.innerText = PHASES[currentPhase].name;
        reactantIconSpan.innerText = sub.icon;
    }

    // 先手玩家（左侧）劣势，位置 60~80
    function computeInitialPosition() {
        return Math.floor(Math.random() * (80 - 60 + 1) + 60);
    }

    // 移动反应物，返回是否结束游戏
    function moveReaction(delta, newPhaseAfter = null) {
        if (!gameActive) return false;
        let newPos = position + delta;
        if (newPos <= 0) {
            gameActive = false;
            gameMessageDiv.innerHTML = `🎉 ${leftNameSpan.innerText} 胜利！物质完全转化为${PHASES[leftPhase].name}！点击「新物质·新对局」继续 🎉`;
            alert(`${leftNameSpan.innerText} 获胜！`);
            return true;
        } else if (newPos >= 100) {
            gameActive = false;
            gameMessageDiv.innerHTML = `🎉 ${rightNameSpan.innerText} 胜利！物质完全转化为${PHASES[rightPhase].name}！点击「新物质·新对局」继续 🎉`;
            alert(`${rightNameSpan.innerText} 获胜！`);
            return true;
        }
        position = newPos;
        if (newPhaseAfter && newPhaseAfter !== currentPhase) {
            currentPhase = newPhaseAfter;
            reactantStateSpan.innerText = PHASES[currentPhase].name;
        }
        updateUI();
        return false;
    }

    // 核心：根据卡牌和当前状态计算偏移方向与幅度
    function computeDeltaAndNewPhase(card, playerPhase) {
        const currentOrder = PHASES[currentPhase].order;
        const playerOrder = PHASES[playerPhase].order;
        let newPhase = card.getNewPhase(currentPhase);
        let direction = 0;
        let magnitude = 8; // 基础幅度
        let message = "";

        if (card.name === "🧪 催化") {
            // 催化：直接向玩家相方向偏移
            if (playerOrder > currentOrder) direction = +1;
            else if (playerOrder < currentOrder) direction = -1;
            else direction = 0;
            magnitude = 6;
            message = `催化反应使物质向${PHASES[playerPhase].name}偏移。`;
        } else {
            if (newPhase && newPhase !== currentPhase) {
                // 有相变：计算新旧相与玩家相的距离
                const newOrder = PHASES[newPhase].order;
                const distOld = Math.abs(currentOrder - playerOrder);
                const distNew = Math.abs(newOrder - playerOrder);
                if (distNew < distOld) {
                    // 更接近玩家 -> 向玩家方向偏移
                    direction = (playerOrder > currentOrder) ? +1 : -1;
                    message = `物质转变为${PHASES[newPhase].name}，更接近你的相，向你移动。`;
                } else if (distNew > distOld) {
                    // 更远离玩家 -> 向对手方向偏移（即反向）
                    direction = (playerOrder > currentOrder) ? -1 : +1;
                    message = `物质转变为${PHASES[newPhase].name}，更远离你的相，向对手移动。`;
                } else {
                    // 距离不变，使用自然方向
                    direction = card.naturalDirection;
                    message = `物质转变为${PHASES[newPhase].name}，相距离不变，按自然趋势移动。`;
                }
            } else {
                // 无相变，使用自然方向
                direction = card.naturalDirection;
                message = `物质相未变，按自然趋势移动。`;
            }
            // 幅度微调：若自然方向为0（不会发生），这里忽略
        }

        // 特殊处理：如果direction=0，则无偏移
        if (direction === 0) magnitude = 0;
        const delta = direction * magnitude;
        return { delta, newPhase: (newPhase !== currentPhase ? newPhase : null), message };
    }

    // 抽卡
    function drawCards() {
        const shuffled = [...CARD_TEMPLATES];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        currentCards = shuffled.slice(0, 4);
        renderCards();
    }

    // 使用卡牌
    function useCard(card) {
        if (!gameActive) {
            gameMessageDiv.innerHTML = "游戏已结束，请重新开局。";
            return;
        }
        const playerPhase = (currentTurn === "left") ? leftPhase : rightPhase;
        const { delta, newPhase, message } = computeDeltaAndNewPhase(card, playerPhase);
        const ended = moveReaction(delta, newPhase);
        gameMessageDiv.innerHTML = `${currentTurn === "left" ? leftNameSpan.innerText : rightNameSpan.innerText} 使用了 ${card.name}！${message} 拉动 ${delta.toFixed(1)} 点。`;
        if (!ended) {
            currentTurn = (currentTurn === "left") ? "right" : "left";
            drawCards();
            updateUI();
            gameMessageDiv.innerHTML += ` 轮到 ${currentTurn === "left" ? leftNameSpan.innerText : rightNameSpan.innerText} 回合。`;
        } else {
            renderCards(true);
        }
    }

    function renderCards(disable = false) {
        cardsContainer.innerHTML = '';
        for (let card of currentCards) {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            if (disable) cardDiv.classList.add('disabled');
            cardDiv.innerHTML = `
                <div class="card-name">${card.name}</div>
                <div class="card-desc">${card.desc}</div>
                <div class="card-power">⚡ 智能相变</div>
            `;
            if (!disable) {
                cardDiv.addEventListener('click', () => useCard(card));
            }
            cardsContainer.appendChild(cardDiv);
        }
    }

    function updateUI() {
        let percent = (position / 100) * 100;
        progressFill.style.width = `${percent}%`;
        positionLabel.innerText = position.toFixed(1);
        if (currentTurn === 'left') {
            leftDiv.classList.add('active');
            rightDiv.classList.remove('active');
            turnIndicator.innerText = `${leftNameSpan.innerText} 回合`;
        } else {
            rightDiv.classList.add('active');
            leftDiv.classList.remove('active');
            turnIndicator.innerText = `${rightNameSpan.innerText} 回合`;
        }
    }

    function resetGame() {
        gameActive = true;
        assignPlayerPhases();
        selectRandomSubstance();
        position = computeInitialPosition();
        currentTurn = "left";
        drawCards();
        updateUI();
        gameMessageDiv.innerHTML = "✨ 新物质登场！先手玩家处于劣势，使用卡牌让物质相更接近你，它就会向你移动！";
        renderCards();
    }

    function init() {
        assignPlayerPhases();
        selectRandomSubstance();
        position = computeInitialPosition();
        currentTurn = "left";
        gameActive = true;
        drawCards();
        updateUI();
        resetBtn.addEventListener('click', () => resetGame());
    }

    init();
</script>
</body>
</html>
